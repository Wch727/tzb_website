<section class="game-command-center">
    <div class="game-command-left">
        <span class="game-command-badge">${badge}</span>
        <h1>${title}</h1>
        <p>${subtitle}</p>
        <div class="game-command-tags">
            <i>${campaign_title}</i>
            <i>${date}</i>
            <i>${place}</i>
            <i>${difficulty}</i>
        </div>
    </div>
    <div class="game-command-right">
        <div class="game-command-meta">
            <span>当前小队</span>
            <strong>${team_name}</strong>
        </div>
        <p>${prologue}</p>
        <div class="game-command-alerts">
            <div><b>风险</b>${risk_hint}</div>
            <div><b>奖励</b>${reward_hint}</div>
        </div>
    </div>
</section>
